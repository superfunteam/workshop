[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# The edge function declares its own path via `export const config` in
# netlify/edge-functions/api.ts — declaring it here too would register it twice.
#
# The SPA fallback lives in public/_redirects (shipped inside the built dist/)
# rather than here: netlify dev applies toml redirects BEFORE proxying to the
# Vite dev server, which would swallow Vite's module URLs in local dev.
